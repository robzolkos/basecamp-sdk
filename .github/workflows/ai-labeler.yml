name: Classify PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: classify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: write

jobs:
  classify:
    uses: basecamp/.github/.github/workflows/ai-classify-pr.yml@0f236fea0ac36da812ff7178af3af1b4ee686c3c
    with:
      prompt-file: .github/prompts/classify-pr.prompt.yml
      labels: "bug,enhancement,documentation"
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write

  breaking:
    uses: basecamp/.github/.github/workflows/ai-breaking-change.yml@0f236fea0ac36da812ff7178af3af1b4ee686c3c
    with:
      prompt-file: .github/prompts/detect-breaking.prompt.yml
      file-patterns: |
        go/pkg/basecamp/*.go
        typescript/src/client.ts
        typescript/src/errors.ts
        typescript/src/index.ts
        typescript/src/pagination.ts
        typescript/src/generated/services/**/*.ts
        typescript/src/generated/authorization.ts
        typescript/src/generated/schema.d.ts
        ruby/lib/basecamp.rb
        ruby/lib/basecamp/client.rb
        ruby/lib/basecamp/config.rb
        ruby/lib/basecamp/errors.rb
        ruby/lib/basecamp/services/**/*.rb
        ruby/lib/basecamp/generated/services/**/*.rb
        kotlin/sdk/src/commonMain/kotlin/com/basecamp/sdk/*.kt
        kotlin/sdk/src/commonMain/kotlin/com/basecamp/sdk/services/**/*.kt
        kotlin/sdk/src/commonMain/kotlin/com/basecamp/sdk/generated/**/*.kt
        swift/Sources/Basecamp/*.swift
        swift/Sources/Basecamp/Services/*.swift
        swift/Sources/Basecamp/Generated/**/*.swift
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write

  spec-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build prompt
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr diff "$PR" --name-only | grep -cE '^(spec/|openapi\.json|behavior-model\.json)' || true)
          if [ "$CHANGED" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          gh pr diff "$PR" -- spec/ openapi.json behavior-model.json > /tmp/spec.diff 2>/dev/null || true
          TITLE=$(gh pr view "$PR" --json title --jq .title)

          {
            printf 'PR #%s: %s\n' "$PR" "$TITLE"
            echo ""
            echo "Spec diff:"
            head -c 100000 /tmp/spec.diff
          } > /tmp/user-message.txt

          python3 << 'SPLICE'
          with open('.github/prompts/spec-impact.prompt.yml') as f:
              lines = f.readlines()
          with open('/tmp/user-message.txt') as f:
              user_msg = f.read()

          insert_at = len(lines)
          for i, line in enumerate(lines):
              if i == 0:
                  continue
              if line.strip() and not line[0].isspace():
                  insert_at = i
                  break

          entry = ['  - role: user\n', '    content: |\n']
          for ln in user_msg.splitlines():
              entry.append('      ' + ln + '\n')

          lines[insert_at:insert_at] = entry
          with open('/tmp/prompt.yml', 'w') as f:
              f.writelines(lines)

          try:
              import yaml
              doc = yaml.safe_load(open('/tmp/prompt.yml'))
              assert doc['messages'][-1]['role'] == 'user', 'prompt splice failed'
          except ImportError:
              pass
          SPLICE
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Analyze impact
        if: steps.check.outputs.skip != 'true'
        id: analyze
        uses: actions/ai-inference@e09e65981758de8b2fdab13c2bfb7c7d5493b0b6 # v2.0.7
        with:
          prompt-file: /tmp/prompt.yml

      - name: Post impact comment
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESPONSE_FILE: ${{ steps.analyze.outputs.response-file }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          # Strip outer code-fence wrapper if the model adds one (first/last lines only)
          sed -E '1{/^``` *(markdown|md)? *$/d;}; ${/^``` *$/d;}' "$RESPONSE_FILE" > /tmp/clean-comment.md

          EXISTING=$(gh pr view "$PR" --json comments --jq '.comments[] | select(.body | startswith("## Spec Change Impact")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api graphql -f query="mutation { updateIssueComment(input: {id: \"$EXISTING\", body: $(jq -Rs . "/tmp/clean-comment.md")}) { issueComment { id } } }"
          else
            gh pr comment "$PR" --body-file "/tmp/clean-comment.md"
          fi
