changelog:
  exclude:
    authors:
      - dependabot[bot]
  categories:
    - title: "⚠️ Breaking Changes"
      labels:
        - breaking
    - title: Features
      labels:
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: CI & Infrastructure
      labels:
        - ci
        - dependencies
        - github-actions
    - title: Documentation
      labels:
        - documentation
    - title: Other
      labels:
        - '*'
